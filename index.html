<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>JJOPS Weigh Station</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{--bg:#1a1a2e;--surface:#4a2c6a;--surface-light:#5d3a80;--accent:#9b59b6;--success:#4ade80;--warning:#f59e0b;--danger:#ef4444;--text:#fff;--text-dim:#c9b8d9;--weigh-color:#3b82f6;--prep-color:#8b5cf6}
        html,body{height:100%;overflow:hidden}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;user-select:none}
        .header{background:var(--surface);padding:8px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0}
        .header h1{display:flex;align-items:center;gap:8px;font-size:1rem} .header h1 span{color:var(--accent)}
        .employee-badge{background:var(--success);color:var(--bg);padding:6px 14px;border-radius:20px;font-size:0.85rem;font-weight:700}
        .scale-indicator{padding:6px 12px;border-radius:20px;font-size:0.75rem;font-weight:700;background:rgba(255,255,255,0.1);color:var(--text-dim);cursor:pointer}
        .scale-indicator.connected{background:rgba(74,222,128,0.2);color:var(--success)}
        .scale-indicator.stale{background:rgba(245,158,11,0.3);color:var(--warning);animation:staleFlash 1.5s infinite}
        .scale-indicator.dead{background:rgba(239,68,68,0.3);color:var(--danger);animation:staleFlash 1s infinite}
        @keyframes staleFlash{0%,100%{opacity:1}50%{opacity:0.6}}
        .header-right{display:flex;align-items:center;gap:8px}
        .logout-btn{background:var(--surface-light);color:var(--text);border:none;padding:6px 14px;border-radius:20px;font-size:0.8rem;font-weight:600;cursor:pointer}

        /* PIN LOGIN */
        .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:15px;padding:20px}
        .login-title{font-size:1.4rem;color:var(--accent);font-weight:700}
        .login-subtitle{font-size:0.9rem;color:var(--text-dim);text-align:center}
        .pin-display{display:flex;gap:12px;margin:10px 0}
        .pin-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--accent);background:transparent;transition:all 0.15s}
        .pin-dot.filled{background:var(--accent);border-color:var(--accent)}
        .pin-dot.error{border-color:var(--danger);background:var(--danger)}
        .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:280px;width:100%}
        .pin-key{background:var(--surface);border:none;color:var(--text);font-size:1.5rem;font-weight:700;padding:18px;border-radius:12px;cursor:pointer;font-family:inherit;transition:all 0.1s}
        .pin-key:active{background:var(--accent);transform:scale(0.95)}
        .pin-key.backspace{font-size:1.2rem;color:var(--text-dim)}
        .pin-key.zero{grid-column:2}
        .pin-status{font-size:0.85rem;color:var(--warning);min-height:20px;text-align:center}

        /* NAME INPUT */
        .name-input-screen{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px;padding:30px}
        .name-input-screen.active{display:flex}
        .name-input{width:100%;max-width:350px;padding:15px;border-radius:12px;border:2px solid var(--accent);background:var(--surface);color:var(--text);font-size:1.2rem;font-family:inherit;text-align:center}
        .name-input::placeholder{color:var(--text-dim)}
        .name-submit-btn{width:100%;max-width:350px;padding:16px;border-radius:12px;border:none;background:var(--success);color:var(--bg);font-size:1.1rem;font-weight:800;cursor:pointer;font-family:inherit}
        .name-submit-btn:disabled{opacity:0.4;cursor:not-allowed}
        .scale-connect-btn-login{background:var(--surface-light);border:2px solid var(--accent);color:var(--text);padding:10px 20px;border-radius:12px;font-size:0.9rem;font-weight:600;cursor:pointer}
        .scale-connect-btn-login:disabled{opacity:0.5}

        /* ORDER LIST */
        .order-list-screen{display:none;flex:1;flex-direction:column;overflow:hidden}
        .order-list-screen.active{display:flex}
        .order-list-header{padding:10px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0}
        .order-list-header h2{font-size:1.1rem}
        .count-badge{background:var(--accent);color:white;padding:4px 12px;border-radius:20px;font-size:0.85rem;font-weight:700}

        /* TABS */
        .tab-bar{display:flex;background:var(--surface);border-bottom:2px solid rgba(255,255,255,0.08);flex-shrink:0}
        .tab-btn{flex:1;padding:11px;text-align:center;font-size:0.9rem;font-weight:700;cursor:pointer;color:var(--text-dim);border-bottom:3px solid transparent;transition:all 0.2s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
        .tab-btn.active{color:#fff;border-bottom-color:var(--accent)}

        .order-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
        .order-card{background:var(--surface);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all 0.15s;border:2px solid transparent}
        .order-card:active{transform:scale(0.98)}
        .order-card.claimed{border-color:var(--warning);opacity:0.6;pointer-events:none}
        .order-card.mine{border-color:var(--success)}
        .order-card.claiming-now{border-color:var(--accent);opacity:0.5;pointer-events:none}
        .order-card.completed{border-color:rgba(74,222,128,0.4);opacity:0.8;background:rgba(74,222,128,0.06)}
        .order-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
        .order-card-car{font-weight:800;font-size:1.1rem}
        .order-card-time{font-size:0.8rem;color:var(--text-dim)}
        .order-card-items{font-size:0.85rem;color:var(--text-dim);display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
        .order-card-items .weigh-count{color:var(--weigh-color);font-weight:600}
        .order-card-items .prep-count{color:var(--prep-color);font-weight:600}
        .order-card-claimed{font-size:0.8rem;color:var(--warning);font-weight:600;margin-top:4px}
        .order-card-notes{font-size:0.8rem;color:var(--warning);margin-top:4px;font-weight:600}
        .order-card-allergy{background:#dc2626;color:white;padding:8px 12px;border-radius:8px;margin-top:6px;font-weight:900;font-size:0.9rem;text-align:center;letter-spacing:0.5px;animation:allergyPulse 1.5s infinite}
        .work-item-allergy{background:#dc2626;color:white;padding:8px 12px;border-radius:8px;margin-top:6px;font-weight:900;font-size:1.05rem;letter-spacing:0.5px;animation:allergyPulse 1.5s infinite}
        @keyframes allergyPulse{0%,100%{opacity:1}50%{opacity:0.7}}
        .no-orders{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-dim);gap:10px}
        .no-orders .icon{font-size:3rem} .no-orders .msg{font-size:1.1rem}
        .poll-status{font-size:0.75rem;color:var(--text-dim);text-align:center;padding:8px;flex-shrink:0}

        /* DELETE BUTTON */
        .order-card-wrap{position:relative;display:flex;align-items:stretch;gap:6px}
        .order-card-wrap .order-card{flex:1;min-width:0}
        .order-card-delete{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);color:#ef4444;width:44px;border-radius:12px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s;padding:0}
        .order-card-delete:hover{background:rgba(239,68,68,0.35)}

        /* ORDER WORK */
        .order-work-screen{display:none;flex:1;flex-direction:column;overflow:hidden}
        .order-work-screen.active{display:flex}
        .work-header{background:var(--surface);padding:10px 15px;border-bottom:1px solid rgba(255,255,255,0.1)}
        .work-header-top{display:flex;justify-content:space-between;align-items:center}
        .work-car{font-weight:800;font-size:1.2rem}
        .work-back-btn{background:var(--surface-light);border:none;color:var(--text);padding:8px 14px;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer}
        .work-meta{font-size:0.8rem;color:var(--text-dim);margin-top:4px}
        .work-notes{font-size:0.85rem;color:var(--warning);font-weight:600;margin-top:4px}
        .work-order-type-badge{display:inline-block;padding:5px 12px;border-radius:20px;font-size:0.85rem;font-weight:800;margin-top:6px;letter-spacing:0.03em}
        .work-order-type-badge.walkup{background:#0ea5e9;color:white}
        .work-order-type-badge.drivethru{background:#f59e0b;color:#1a1a2e}
        .scale-bar{background:var(--surface);padding:8px 15px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.1)}
        .scale-weight{font-size:1.8rem;font-weight:800;font-variant-numeric:tabular-nums;min-width:80px}
        .scale-weight .unit{font-size:0.9rem;color:var(--text-dim);font-weight:600}
        .scale-feedback{flex:1;text-align:center;font-weight:700;font-size:1rem}
        .scale-connect-btn{background:var(--accent);border:none;color:white;padding:8px 16px;border-radius:8px;font-weight:700;font-size:0.85rem;cursor:pointer}
        .scale-reconnect-btn{background:var(--danger);border:none;color:white;padding:8px 16px;border-radius:8px;font-weight:700;font-size:0.85rem;cursor:pointer;animation:staleFlash 1.5s infinite}

        /* ITEMS GRID */
        .items-scroll{flex:1;overflow-y:auto;padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px;align-content:start}
        .section-label{grid-column:1 / -1;font-size:0.95rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:8px 4px 4px;display:flex;align-items:center;gap:8px}
        .section-label.weigh{color:var(--weigh-color)} .section-label.prep{color:var(--prep-color)}
        .work-item{background:var(--surface);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all 0.15s;border-left:5px solid var(--surface-light);min-height:80px;display:flex;flex-direction:column;justify-content:center}
        .work-item:active{transform:scale(0.98)}
        .work-item.weigh-item{border-left-color:var(--weigh-color);background:rgba(59,130,246,0.12);border:2px solid rgba(59,130,246,0.3);border-left:5px solid var(--weigh-color)}
        .work-item.prep-item{border-left-color:var(--prep-color);background:rgba(139,92,246,0.08);border:2px solid rgba(139,92,246,0.2);border-left:5px solid var(--prep-color)}
        .work-item.done{opacity:0.5;background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.2);border-left-color:var(--success)}
        .work-item-top{display:flex;justify-content:space-between;align-items:center}
        .work-item-name{font-weight:800;font-size:1.25rem} .work-item-target{font-size:1rem;color:var(--text-dim);font-weight:700}
        .work-item-flavors{font-size:1.15rem;color:var(--text-dim);margin-top:4px;font-weight:600}
        .work-item-mod{font-size:1rem;color:var(--text-dim);margin-top:2px;padding-left:12px;font-weight:500}
        .work-item-note{font-size:1rem;color:var(--warning);font-weight:700;margin-top:4px}
        .work-item-weight{font-size:1rem;font-weight:700;margin-top:6px}
        .work-item-weight.good{color:var(--success)} .work-item-weight.over{color:var(--danger)} .work-item-weight.under{color:var(--warning)}
        .item-check{font-size:1.8rem;color:var(--success)} .item-type-icon{font-size:1rem;margin-right:4px}
        .work-footer{padding:10px 15px;border-top:1px solid rgba(255,255,255,0.1)}
        .complete-btn{width:100%;padding:16px;border-radius:12px;border:none;font-family:inherit;font-size:1.1rem;font-weight:800;cursor:pointer}
        .complete-btn.ready{background:var(--success);color:var(--bg)} .complete-btn.partial{background:var(--warning);color:var(--bg)}
        .complete-btn:disabled{opacity:0.4;cursor:not-allowed;background:var(--surface-light);color:var(--text-dim)}
        .work-item-sprinkles{font-size:1rem;color:#16a34a;font-weight:700;margin-top:4px}

        /* MODALS */
        .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:200}
        .modal-overlay.show{display:flex}
        .modal-content{background:var(--surface);border-radius:16px;padding:25px;max-width:350px;width:90%;text-align:center}
        .modal-icon{font-size:3rem;margin-bottom:10px} .modal-title{font-size:1.3rem;font-weight:700;margin-bottom:8px}
        .modal-weight{font-size:2rem;font-weight:800;margin-bottom:4px}
        .modal-target{font-size:0.9rem;color:var(--text-dim);margin-bottom:15px}
        .modal-message{font-size:0.9rem;color:var(--text-dim);margin-bottom:20px;line-height:1.4}
        .modal-buttons{display:flex;gap:10px}
        .modal-btn{flex:1;padding:14px;border:none;border-radius:10px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer}
        .modal-btn.primary{background:var(--accent);color:white} .modal-btn.secondary{background:var(--surface-light);color:white}
        .modal-btn.danger{background:var(--danger);color:white}
        .warning-under{color:var(--warning)} .warning-over{color:var(--danger)}
        .skip-reasons{display:flex;flex-direction:column;gap:8px;margin-bottom:15px}
        .skip-reason-btn{padding:12px;border-radius:10px;border:2px solid var(--surface-light);background:transparent;color:var(--text);font-family:inherit;font-size:0.95rem;font-weight:600;cursor:pointer;text-align:left}
        .skip-reason-btn.selected{border-color:var(--accent);background:rgba(155,89,182,0.2)}

        /* TOAST */
        .toast{position:fixed;top:100px;left:50%;transform:translateX(-50%) translateY(-200px);background:var(--success);color:var(--bg);padding:15px 30px;border-radius:12px;font-weight:600;font-size:1.1rem;transition:transform 0.3s;z-index:300;white-space:nowrap;max-width:90%}
        .toast.error{background:var(--danger);color:white} .toast.show{transform:translateX(-50%) translateY(0)}
    </style>
</head>
<body>
    <header class="header">
        <h1>⚖️ <span>Weigh Station</span></h1>
        <div class="header-right">
            <span class="scale-indicator" id="scaleIndicator" title="Tap to reconnect scale">No Scale</span>
            <span class="employee-badge" id="employeeBadge" style="display:none;"></span>
            <button class="logout-btn" id="logoutBtn" style="display:none;">Logout</button>
        </div>
    </header>

    <!-- PIN LOGIN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-title" id="loginTitle">Enter Your PIN</div>
        <div class="login-subtitle" id="loginSubtitle">Use your Square PIN</div>
        <div class="pin-display" id="pinDisplay">
            <div class="pin-dot" id="dot0"></div>
            <div class="pin-dot" id="dot1"></div>
            <div class="pin-dot" id="dot2"></div>
            <div class="pin-dot" id="dot3"></div>
        </div>
        <div class="pin-status" id="pinStatus"></div>
        <div class="pin-pad" id="pinPad">
            <button class="pin-key" data-key="1">1</button>
            <button class="pin-key" data-key="2">2</button>
            <button class="pin-key" data-key="3">3</button>
            <button class="pin-key" data-key="4">4</button>
            <button class="pin-key" data-key="5">5</button>
            <button class="pin-key" data-key="6">6</button>
            <button class="pin-key" data-key="7">7</button>
            <button class="pin-key" data-key="8">8</button>
            <button class="pin-key" data-key="9">9</button>
            <button class="pin-key backspace" data-key="back">⌫</button>
            <button class="pin-key zero" data-key="0">0</button>
            <button class="pin-key backspace" data-key="clear">C</button>
        </div>
        <button class="scale-connect-btn-login" id="loginScaleBtn">Connect Scale</button>
    </div>

    <!-- NAME INPUT -->
    <div class="name-input-screen" id="nameInputScreen">
        <div class="login-title">Welcome! Enter Your Name</div>
        <div class="login-subtitle">This PIN hasn't been used before</div>
        <input type="text" class="name-input" id="nameInput" placeholder="First and Last Name" autocomplete="off">
        <button class="name-submit-btn" id="nameSubmitBtn" disabled>REGISTER & START</button>
    </div>

    <!-- ORDER LIST -->
    <div class="order-list-screen" id="orderListScreen">
        <div class="order-list-header">
            <h2>Orders</h2>
            <span class="count-badge" id="orderCountBadge">0</span>
        </div>
        <div class="tab-bar">
            <button class="tab-btn active" id="tabPending" onclick="switchTab('pending')">⚖️ Pending</button>
            <button class="tab-btn" id="tabCompleted" onclick="switchTab('completed')">✓ Completed</button>
        </div>
        <div class="order-list" id="orderList"></div>
        <div class="poll-status" id="pollStatus">Checking for orders...</div>
    </div>

    <!-- ORDER WORK -->
    <div class="order-work-screen" id="orderWorkScreen">
        <div class="work-header">
            <div class="work-header-top"><span class="work-car" id="workCar"></span><button class="work-back-btn" id="workBackBtn">← Orders</button></div>
            <div class="work-meta" id="workMeta"></div>
            <div class="work-notes" id="workNotes"></div>
            <div id="workOrderTypeBadge"></div>
        </div>
        <div class="scale-bar" id="scaleBar">
            <div class="scale-weight"><span id="currentWeight">0.0</span><span class="unit"> oz</span></div>
            <div class="scale-feedback" id="scaleFeedback"></div>
            <button class="scale-connect-btn" id="connectScaleBtn">Connect Scale</button>
            <button class="scale-reconnect-btn" id="reconnectScaleBtn" style="display:none;">⚠ Reconnect Scale</button>
        </div>
        <div class="items-scroll" id="itemsScroll"></div>
        <div class="work-footer"><button class="complete-btn" id="completeBtn" disabled>COMPLETE ORDER</button></div>
    </div>

    <!-- WEIGHT WARNING MODAL -->
    <div class="modal-overlay" id="weightWarningModal"><div class="modal-content" style="position:relative;">
        <button id="weightWarningClose" style="position:absolute;top:10px;right:10px;background:rgba(255,255,255,0.15);border:none;color:var(--text);width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
        <div class="modal-icon" id="warningIcon">⚠️</div>
        <div class="modal-title" id="warningTitle">UNDER WEIGHT</div>
        <div class="modal-weight" id="warningWeight">0.0 oz</div>
        <div class="modal-target" id="warningTarget">Target: 0.0 oz</div>
        <div class="modal-message" id="warningMessage"></div>
        <div class="modal-buttons"><button class="modal-btn primary" id="reweighBtn">Add & Re-weigh</button><button class="modal-btn secondary" id="acceptWeightBtn">Accept</button></div>
    </div></div>

    <!-- SKIP WARNING MODAL -->
    <div class="modal-overlay" id="skipWarningModal"><div class="modal-content">
        <div class="modal-icon">⚠️</div>
        <div class="modal-title" style="color:var(--warning);">Items Not Complete</div>
        <div class="modal-message" id="skipMessage"></div>
        <div class="skip-reasons" id="skipReasons">
            <button class="skip-reason-btn" data-reason="Scale not working">Scale not working</button>
            <button class="skip-reason-btn" data-reason="Remake">Remake / redo</button>
            <button class="skip-reason-btn" data-reason="Other">Other</button>
        </div>
        <div class="modal-buttons"><button class="modal-btn secondary" id="skipCancelBtn">Go Back</button><button class="modal-btn primary" id="skipConfirmBtn" disabled>Complete Anyway</button></div>
    </div></div>

    <!-- DELETE ORDER MODAL -->
    <div class="modal-overlay" id="deleteOrderModal"><div class="modal-content">
        <div class="modal-icon">🗑️</div>
        <div class="modal-title" style="color:var(--danger);">Delete Order?</div>
        <div class="modal-message" id="deleteOrderMessage">Are you sure you want to delete this order?</div>
        <div class="modal-buttons">
            <button class="modal-btn secondary" id="deleteCancelBtn">Keep It</button>
            <button class="modal-btn danger" id="deleteConfirmBtn">Yes, Delete</button>
        </div>
    </div></div>

    <div class="toast" id="toast"></div>

<script>
const API_BASE='https://script.google.com/macros/s/AKfycbxnJ44_O7MLk0XAFlpgIc-biN3YHCrxiFgnNswxa27_Zu-2BdDfstwf9XtGsnPpH5tt/exec';
const LOCATION='Garden of the Gods';
const POLL_INTERVAL=5000;
const TOLERANCE=0.5;
const SCALE_VERIFY_TIMEOUT=3000;
const SCALE_DATA_TIMEOUT=10000;
const SCALE_WATCHDOG_INTERVAL=2000;

let currentEmployee=null,currentWeight=0,scaleDevice=null,orders=[],activeOrder=null,workItems=[],pollTimer=null,pendingWeighItem=null,claiming=false;
let scaleState='disconnected',lastDataReceived=0,scaleWatchdogTimer=null,scaleVerifyTimer=null,scaleReconnecting=false;
let pendingDeleteOrderId=null;
let activeTab='pending';
let deletedOrderIds=[];

const $=id=>document.getElementById(id);
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function showToast(msg,err=false){const t=$('toast');t.textContent=msg;t.className='toast'+(err?' error':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

async function apiGet(action,params={}){const url=new URL(API_BASE);url.searchParams.set('action',action);Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));const r=await fetch(url.toString(),{redirect:'follow'});return r.json();}
async function apiPost(action,body){const r=await fetch(API_BASE+'?action='+action,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body),redirect:'follow'});return r.json();}

// ===== SCALE STATE MACHINE =====
function setScaleState(newState){
    scaleState=newState;
    const ind=$('scaleIndicator'),connectBtn=$('connectScaleBtn'),reconnectBtn=$('reconnectScaleBtn'),loginBtn=$('loginScaleBtn');
    switch(newState){
        case 'disconnected':
            ind.textContent='No Scale';ind.className='scale-indicator';
            connectBtn.style.display='block';connectBtn.textContent='Connect Scale';
            reconnectBtn.style.display='none';loginBtn.textContent='Connect Scale';loginBtn.disabled=false;break;
        case 'connecting':
            ind.textContent='⏳ Connecting...';ind.className='scale-indicator';
            connectBtn.style.display='none';reconnectBtn.style.display='none';
            loginBtn.textContent='Connecting...';loginBtn.disabled=true;break;
        case 'verifying':
            ind.textContent='⏳ Verifying...';ind.className='scale-indicator stale';
            connectBtn.style.display='none';reconnectBtn.style.display='none';break;
        case 'live':
            ind.textContent='⚖️ Scale OK';ind.className='scale-indicator connected';
            connectBtn.style.display='none';reconnectBtn.style.display='none';
            loginBtn.textContent='✓ Scale Connected';loginBtn.disabled=true;break;
        case 'stale':
            ind.textContent='⚠ Scale Lost — Tap Here';ind.className='scale-indicator dead';
            connectBtn.style.display='none';reconnectBtn.style.display='block';
            loginBtn.textContent='⚠ Reconnect Scale';loginBtn.disabled=false;break;
    }
}

$('scaleIndicator').addEventListener('click',()=>{if(scaleState==='stale'||scaleState==='disconnected')forceReconnectScale();});

function startScaleWatchdog(){
    stopScaleWatchdog();
    scaleWatchdogTimer=setInterval(()=>{
        if(scaleState==='live'){const e=Date.now()-lastDataReceived;if(e>SCALE_DATA_TIMEOUT){setScaleState('stale');showToast('Scale lost — tap Reconnect',true);}}
    },SCALE_WATCHDOG_INTERVAL);
}
function stopScaleWatchdog(){
    if(scaleWatchdogTimer){clearInterval(scaleWatchdogTimer);scaleWatchdogTimer=null;}
    if(scaleVerifyTimer){clearTimeout(scaleVerifyTimer);scaleVerifyTimer=null;}
}

$('loginScaleBtn').addEventListener('click',()=>{if(scaleState==='stale')forceReconnectScale();else connectScale();});
$('connectScaleBtn').addEventListener('click',connectScale);
$('reconnectScaleBtn').addEventListener('click',forceReconnectScale);

async function connectScale(){
    try{setScaleState('connecting');const devs=await navigator.hid.requestDevice({filters:[{vendorId:0x0922},{vendorId:0x1446}]});
    if(!devs.length){showToast('No scale selected',true);setScaleState('disconnected');return;}await openScale(devs[0]);}
    catch(e){showToast('Scale error: '+e.message,true);setScaleState('disconnected');}
}
async function forceReconnectScale(){
    if(scaleReconnecting)return;scaleReconnecting=true;
    if(scaleDevice){try{scaleDevice.removeEventListener('inputreport',handleScaleInput);scaleDevice.removeEventListener('close',onScaleDisconnect);if(scaleDevice.opened)await scaleDevice.close();}catch(e){}scaleDevice=null;}
    setScaleState('connecting');currentWeight=0;$('currentWeight').textContent='0.0';
    await new Promise(r=>setTimeout(r,500));
    try{const devs=await navigator.hid.getDevices();const s=devs.find(d=>d.vendorId===0x0922||d.vendorId===0x1446);if(s){await openScale(s);scaleReconnecting=false;return;}}catch(e){}
    try{const devs=await navigator.hid.requestDevice({filters:[{vendorId:0x0922},{vendorId:0x1446}]});
    if(!devs.length){showToast('No scale selected',true);setScaleState('disconnected');scaleReconnecting=false;return;}await openScale(devs[0]);}
    catch(e){showToast('Reconnect failed: '+e.message,true);setScaleState('disconnected');}
    scaleReconnecting=false;
}
async function openScale(device){
    try{
        scaleDevice=device;
        if(scaleDevice.opened){try{await scaleDevice.close();}catch(e){}await new Promise(r=>setTimeout(r,500));}
        await scaleDevice.open();
        try{scaleDevice.removeEventListener('inputreport',handleScaleInput);}catch(e){}
        try{scaleDevice.removeEventListener('close',onScaleDisconnect);}catch(e){}
        scaleDevice.addEventListener('inputreport',handleScaleInput);
        scaleDevice.addEventListener('close',onScaleDisconnect);
        setScaleState('verifying');
        if(scaleVerifyTimer)clearTimeout(scaleVerifyTimer);
        scaleVerifyTimer=setTimeout(()=>{if(scaleState==='verifying'){setScaleState('stale');showToast('Scale not responding — tap Reconnect',true);}},SCALE_VERIFY_TIMEOUT);
        startScaleWatchdog();
    }catch(e){
        showToast('Scale open failed: '+e.message,true);
        await new Promise(r=>setTimeout(r,2000));
        try{if(!scaleDevice.opened)await scaleDevice.open();
        try{scaleDevice.removeEventListener('inputreport',handleScaleInput);}catch(e2){}
        try{scaleDevice.removeEventListener('close',onScaleDisconnect);}catch(e2){}
        scaleDevice.addEventListener('inputreport',handleScaleInput);scaleDevice.addEventListener('close',onScaleDisconnect);
        setScaleState('verifying');
        if(scaleVerifyTimer)clearTimeout(scaleVerifyTimer);
        scaleVerifyTimer=setTimeout(()=>{if(scaleState==='verifying'){setScaleState('stale');showToast('Scale not responding — tap Reconnect',true);}},SCALE_VERIFY_TIMEOUT);
        startScaleWatchdog();}catch(e2){showToast('Scale failed: '+e2.message,true);setScaleState('disconnected');}
    }
}
function onScaleDisconnect(){
    setScaleState('stale');showToast('Scale disconnected — tap Reconnect',true);
    setTimeout(async()=>{if(scaleState!=='stale')return;try{const devs=await navigator.hid.getDevices();const s=devs.find(d=>d.vendorId===0x0922||d.vendorId===0x1446);if(s)await openScale(s);}catch(e){}},3000);
}
function handleScaleInput(event){
    const b=new Uint8Array(event.data.buffer);lastDataReceived=Date.now();
    if(scaleState==='verifying'){if(scaleVerifyTimer){clearTimeout(scaleVerifyTimer);scaleVerifyTimer=null;}setScaleState('live');showToast('Scale connected!');}
    if(scaleState==='stale'){setScaleState('live');showToast('Scale reconnected!');}
    if(b.length>=5){const uc=b[1],exp=b[2]>127?b[2]-256:b[2],wr=b[3]+(b[4]<<8);let w=wr*Math.pow(10,exp);if(uc===2)w*=0.035274;currentWeight=w;$('currentWeight').textContent=w.toFixed(1);}
}
async function autoConnectScale(){
    if(!navigator.hid)return;
    try{const devs=await navigator.hid.getDevices();const s=devs.find(d=>d.vendorId===0x0922||d.vendorId===0x1446);if(s)await openScale(s);}catch(e){}
}
if(navigator.hid){
    navigator.hid.addEventListener('connect',async(e)=>{if(e.device.vendorId===0x0922||e.device.vendorId===0x1446){await new Promise(r=>setTimeout(r,1000));await openScale(e.device);}});
    navigator.hid.addEventListener('disconnect',(e)=>{if(scaleDevice&&e.device===scaleDevice)onScaleDisconnect();});
}

// ===== PIN LOGIN =====
let pinEntry='',pinMode='login',pendingPin='';
$('pinPad').addEventListener('click',e=>{
    const key=e.target.dataset.key;if(!key)return;
    if(key==='back'){pinEntry=pinEntry.slice(0,-1);updatePinDots();return;}
    if(key==='clear'){pinEntry='';updatePinDots();$('pinStatus').textContent='';return;}
    if(pinEntry.length>=4)return;pinEntry+=key;updatePinDots();if(pinEntry.length===4)handlePinComplete();
});
function updatePinDots(){for(let i=0;i<4;i++)$('dot'+i).className='pin-dot'+(i<pinEntry.length?' filled':'');}
function showPinError(){for(let i=0;i<4;i++)$('dot'+i).className='pin-dot error';setTimeout(()=>{pinEntry='';updatePinDots();},600);}
async function handlePinComplete(){
    if(pinMode==='login'){
        $('pinStatus').textContent='Checking...';
        try{const result=await apiGet('pinlookup',{pin:pinEntry});
        if(result.found){loginEmployee(result);}
        else{pendingPin=pinEntry;pinEntry='';pinMode='confirm';$('loginTitle').textContent='Confirm Your PIN';$('loginSubtitle').textContent='Enter the same 4 digits again';$('pinStatus').textContent='';updatePinDots();}}
        catch(e){$('pinStatus').textContent='Connection error';showPinError();}
    }else if(pinMode==='confirm'){
        if(pinEntry===pendingPin){pinMode='register';$('loginScreen').style.display='none';$('nameInputScreen').classList.add('active');$('nameInput').focus();}
        else{$('pinStatus').textContent="PINs don't match — try again";showPinError();pinMode='login';pendingPin='';$('loginTitle').textContent='Enter Your PIN';$('loginSubtitle').textContent='Use your Square PIN';}
    }
}
$('nameInput').addEventListener('input',()=>{$('nameSubmitBtn').disabled=$('nameInput').value.trim().length<2;});
$('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!$('nameSubmitBtn').disabled)registerEmployee();});
$('nameSubmitBtn').addEventListener('click',registerEmployee);
async function registerEmployee(){
    const name=$('nameInput').value.trim();if(name.length<2)return;
    $('nameSubmitBtn').disabled=true;$('nameSubmitBtn').textContent='Registering...';
    try{const result=await apiPost('pinregister',{pin:pendingPin,name:name});
    if(result.success){loginEmployee({name:result.name,employee_id:result.employee_id});}
    else{showToast(result.error||'Registration failed',true);resetLogin();}}
    catch(e){showToast('Connection error',true);resetLogin();}
}
function loginEmployee(emp){
    currentEmployee={id:emp.employee_id,name:emp.name};
    $('loginScreen').style.display='none';$('nameInputScreen').classList.remove('active');$('orderListScreen').classList.add('active');
    $('employeeBadge').textContent=currentEmployee.name;$('employeeBadge').style.display='inline-block';$('logoutBtn').style.display='inline-block';
    $('pinStatus').textContent='';showToast('Welcome, '+currentEmployee.name+'!');startPolling();
}
function resetLogin(){
    pinEntry='';pinMode='login';pendingPin='';
    $('loginTitle').textContent='Enter Your PIN';$('loginSubtitle').textContent='Use your Square PIN';$('pinStatus').textContent='';
    $('nameInputScreen').classList.remove('active');$('loginScreen').style.display='flex';
    $('nameInput').value='';$('nameSubmitBtn').disabled=true;$('nameSubmitBtn').textContent='REGISTER & START';updatePinDots();
}
$('logoutBtn').addEventListener('click',()=>{
    stopPolling();currentEmployee=null;activeOrder=null;workItems=[];
    $('orderListScreen').classList.remove('active');$('orderWorkScreen').classList.remove('active');
    $('employeeBadge').style.display='none';$('logoutBtn').style.display='none';resetLogin();
});

// ===== POLLING =====
function startPolling(){fetchOrders();pollTimer=setInterval(fetchOrders,POLL_INTERVAL);}
function stopPolling(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}
async function fetchOrders(){
    try{
        const fresh=await apiGet('getpendingorders',{location:LOCATION});
        orders=fresh.filter(o=>deletedOrderIds.indexOf(o.order_id)===-1);
        if(!activeOrder&&!claiming)renderOrderList();
        $('pollStatus').textContent='Last checked: '+new Date().toLocaleTimeString();
    }
    catch(e){$('pollStatus').textContent='Connection error - retrying...';}
}

function orderAge(ts){const m=Math.floor((Date.now()-new Date(ts).getTime())/60000);if(m<1)return'Just now';if(m<60)return m+'m ago';return Math.floor(m/60)+'h '+(m%60)+'m';}

// ===== CLAIM =====
async function claimOrder(id){
    if(claiming)return;const o=orders.find(x=>x.order_id===id);if(!o)return;claiming=false;
    activeOrder=o;activeOrder.claimed_by=currentEmployee.name;
    workItems=o.items.map((item,idx)=>({...item,idx,done:false,weightOz:null,skipped:false,skipReason:null}));
    showWorkScreen();
    // Sync with server in background
    try{await apiGet('claimorder',{order_id:id,employee_id:currentEmployee.id,employee_name:currentEmployee.name});}
    catch(e){console.log('Claim sync failed:',e);}
}
function resumeOrder(o){
    if(claiming)return;claiming=true;activeOrder=o;
    workItems=o.items.map((item,idx)=>({...item,idx,done:false,weightOz:null,skipped:false,skipReason:null}));claiming=false;showWorkScreen();
}

// ===== WORK SCREEN =====
function showWorkScreen(){
    $('orderListScreen').classList.remove('active');$('orderWorkScreen').classList.add('active');
    $('workCar').textContent=activeOrder.car_name||'No Car';
    $('workMeta').textContent=activeOrder.order_id+(activeOrder.payment_type?' • '+activeOrder.payment_type:'');
    $('workNotes').textContent=activeOrder.notes?'📝 '+activeOrder.notes:'';
    $('workNotes').style.display=activeOrder.notes?'block':'none';

    // Order type badge
    const badgeEl=$('workOrderTypeBadge');
    if(activeOrder.order_type==='WALK-UP'){
        badgeEl.innerHTML='<span class="work-order-type-badge walkup">🚶 WALK-UP — COUNTER</span>';
    } else {
        badgeEl.innerHTML='<span class="work-order-type-badge drivethru">🚗 DRIVE-THRU — WINDOW</span>';
    }

    renderWorkItems();
}

function renderWorkItems(){
    const parents=[];
    workItems.forEach(i=>{
        if(i.isMod||i.isTopping||i.isSundaeTopping){
            if(parents.length>0){
                if(!parents[parents.length-1].mods)parents[parents.length-1].mods=[];
                parents[parents.length-1].mods.push(i);
            }
        } else {
            i.mods=[];
            parents.push(i);
        }
    });
    const wi=parents.filter(i=>i.needsWeigh),pi=parents.filter(i=>!i.needsWeigh);let h='';
    if(wi.length){h+='<div class="section-label weigh">⚖️ WEIGH ('+wi.filter(i=>i.done).length+'/'+wi.length+')</div>';wi.forEach(i=>{h+=renderWorkItem(i,true);});}
    if(pi.length){h+='<div class="section-label prep">☑ PREP ('+pi.filter(i=>i.done).length+'/'+pi.length+')</div>';pi.forEach(i=>{h+=renderWorkItem(i,false);});}
    $('itemsScroll').innerHTML=h;
    $('itemsScroll').querySelectorAll('.work-item').forEach(el=>{el.addEventListener('click',()=>handleItemTap(parseInt(el.dataset.idx)));});
    updateCompleteBtn();
}

function renderWorkItem(item,isWeigh){
    const tc=isWeigh?'weigh-item':'prep-item',dc=item.done?' done':'',ic=isWeigh?'⚖️':'☑';
    let wt='';
    if(item.done&&item.weightOz!==null){const d=item.weightOz-item.targetOz;let wc='good';if(Math.abs(d)>TOLERANCE)wc=d>0?'over':'under';wt='<div class="work-item-weight '+wc+'">✓ '+item.weightOz.toFixed(1)+' oz</div>';}
    else if(item.done&&item.skipped){wt='<div class="work-item-weight under">⚠ Not weighed'+(item.skipReason?' - '+item.skipReason:'')+'</div>';}
    else if(item.done){wt='<div class="work-item-weight good">✓ Done</div>';}
    let h='<div class="work-item '+tc+dc+'" data-idx="'+item.idx+'"><div class="work-item-top">';
    h+='<span class="work-item-name"><span class="item-type-icon">'+ic+'</span> '+esc(item.name)+'</span>';
    if(isWeigh&&item.targetOz)h+='<span class="work-item-target">Target: '+item.targetOz+' oz</span>';
    if(item.done)h+='<span class="item-check">✓</span>';
    h+='</div>';
    if(item.flavors)h+='<div class="work-item-flavors">'+esc(item.flavors)+'</div>';
    if(item.allergyAlert)h+='<div class="work-item-allergy">⚠️🧤 ALLERGY — GLOVES + ALLERGY SCOOP + NEW TUB</div>';
    if(item.freeSprinkles)h+='<div class="work-item-sprinkles">🎉 Free Sprinkles</div>';
    if(item.itemNote)h+='<div class="work-item-note">📝 '+esc(item.itemNote)+'</div>';
    if(item.mods&&item.mods.length)item.mods.forEach(m=>{h+='<div class="work-item-mod">'+esc(m.name)+'</div>';});
    h+=wt+'</div>';return h;
}

// ===== ITEM TAP =====
function handleItemTap(idx){
    const item=workItems[idx];if(!item)return;
    if(item.done){item.done=false;item.weightOz=null;item.skipped=false;item.skipReason=null;renderWorkItems();return;}
    if(item.needsWeigh){
        if(scaleState!=='live'){item.done=true;item.skipped=true;item.skipReason='Scale not connected';renderWorkItems();showToast('✓ '+item.name+' marked done (no scale)');return;}
        if(currentWeight<=0){showToast('Place item on scale first',true);return;}
        if(currentWeight<item.targetOz*0.5){showToast('Wait for scale to settle',true);return;}
        const diff=currentWeight-item.targetOz;
        if(diff<-TOLERANCE)showWeightWarning(item,currentWeight,'under');
        else if(diff>TOLERANCE)showWeightWarning(item,currentWeight,'over');
        else{item.done=true;item.weightOz=currentWeight;weighFeedback(item,currentWeight);renderWorkItems();}
    }else{item.done=true;renderWorkItems();showToast('✓ '+item.name);}
}

// ===== WEIGHT WARNINGS =====
function showWeightWarning(item,weight,type){
    pendingWeighItem={item,weight};
    $('warningWeight').textContent=weight.toFixed(1)+' oz';$('warningTarget').textContent='Target: '+item.targetOz+' oz';
    if(type==='under'){$('warningIcon').textContent='⚠️';$('warningTitle').textContent='UNDER WEIGHT';$('warningTitle').className='modal-title warning-under';$('warningWeight').className='modal-weight warning-under';$('warningMessage').textContent='Add more ice cream and re-weigh.';$('reweighBtn').textContent='Add & Re-weigh';$('reweighBtn').style.display='block';$('acceptWeightBtn').textContent='Accept Anyway';}
    else{$('warningIcon').textContent='🔴';$('warningTitle').textContent='OVER WEIGHT';$('warningTitle').className='modal-title warning-over';$('warningWeight').className='modal-weight warning-over';$('warningMessage').textContent='Over target. Remove some and re-weigh, or accept as-is.';$('reweighBtn').textContent='Remove & Re-weigh';$('reweighBtn').style.display='block';$('acceptWeightBtn').textContent='Accept & Continue';}
    $('weightWarningModal').classList.add('show');
}
$('reweighBtn').addEventListener('click',()=>{$('weightWarningModal').classList.remove('show');pendingWeighItem=null;showToast('Adjust and re-weigh');});
$('weightWarningClose').addEventListener('click',()=>{$('weightWarningModal').classList.remove('show');pendingWeighItem=null;});
$('acceptWeightBtn').addEventListener('click',()=>{
    if(pendingWeighItem){const i=pendingWeighItem.item;i.done=true;i.weightOz=pendingWeighItem.weight;weighFeedback(i,pendingWeighItem.weight);renderWorkItems();}
    $('weightWarningModal').classList.remove('show');pendingWeighItem=null;
});
function weighFeedback(item,w){
    const d=Math.abs(w-item.targetOz);let e,m;
    if(d<=0.2){e='🎯';m='PERFECT!';}else if(d<=TOLERANCE){e='👍';m='Good!';}else if(w<item.targetOz){e='⚠️';m='Under';}else{e='😬';m='Over';}
    $('scaleFeedback').textContent=e+' '+m;showToast(e+' '+item.name+': '+w.toFixed(1)+' oz - '+m,d>TOLERANCE);
}

// ===== COMPLETE =====
function updateCompleteBtn(){
    const btn=$('completeBtn');
    const countable=workItems.filter(i=>!i.isMod&&!i.isTopping&&!i.isSundaeTopping);
    const total=countable.length,done=countable.filter(i=>i.done).length,rem=total-done;
    if(!total){btn.disabled=true;btn.textContent='NO ITEMS';return;}
    btn.disabled=false;
    if(!rem){btn.className='complete-btn ready';btn.textContent='Mark Order as Complete';}
    else{btn.className='complete-btn partial';btn.textContent='⚠ Mark Complete ('+rem+' not done)';}
}
$('completeBtn').addEventListener('click',()=>{
    const rem=workItems.filter(i=>!i.done&&!i.isMod&&!i.isTopping&&!i.isSundaeTopping);
    if(rem.length)showSkipWarning(rem);else completeOrder();
});

let selectedSkipReason=null;
function showSkipWarning(rem){
    const wr=rem.filter(i=>i.needsWeigh),pr=rem.filter(i=>!i.needsWeigh);
    let m='';if(wr.length)m+=wr.length+' item(s) not weighed. ';if(pr.length)m+=pr.length+' item(s) not prepped. ';
    $('skipMessage').textContent=m;selectedSkipReason=null;$('skipConfirmBtn').disabled=true;
    $('skipReasons').querySelectorAll('.skip-reason-btn').forEach(b=>b.classList.remove('selected'));
    $('skipWarningModal').classList.add('show');
}
$('skipReasons').querySelectorAll('.skip-reason-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{selectedSkipReason=btn.dataset.reason;$('skipReasons').querySelectorAll('.skip-reason-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');$('skipConfirmBtn').disabled=false;});
});
$('skipCancelBtn').addEventListener('click',()=>{$('skipWarningModal').classList.remove('show');});
$('skipConfirmBtn').addEventListener('click',()=>{
    workItems.forEach(i=>{if(!i.done&&!i.isMod&&!i.isTopping&&!i.isSundaeTopping){i.done=true;i.skipped=true;i.skipReason=selectedSkipReason;}});
    $('skipWarningModal').classList.remove('show');completeOrder();
});

async function completeOrder(){
    const payload={order_id:activeOrder.order_id,location:LOCATION,employee_id:currentEmployee.id,employee_name:currentEmployee.name,
        items:workItems.map(i=>({item_name:i.name,sku:i.sku,flavors:i.flavors||'',needs_weigh:i.needsWeigh,target_oz:i.targetOz,weight_oz:i.weightOz,skipped:i.skipped||false,skip_reason:i.skipReason||null}))};
    // Optimistic — update UI immediately
    showToast('✓ Order complete!');
    activeOrder=null;workItems=[];
    $('orderWorkScreen').classList.remove('active');$('orderListScreen').classList.add('active');
    fetchOrders();
    // Sync with server in background
    try{await apiPost('completeorder',payload);}
    catch(e){console.log('Complete sync failed:',e);}
}

$('workBackBtn').addEventListener('click',()=>{
    const dc=workItems.filter(i=>i.done).length;
    if(dc>0&&!confirm('You have '+dc+' items done. Leave without completing?'))return;
    activeOrder=null;workItems=[];$('orderWorkScreen').classList.remove('active');$('orderListScreen').classList.add('active');renderOrderList();
});

// INIT
if(navigator.hid){autoConnectScale();}else{$('scaleIndicator').textContent='No WebHID';$('loginScaleBtn').textContent='WebHID not supported';$('loginScaleBtn').disabled=true;}
</script>
</body>
